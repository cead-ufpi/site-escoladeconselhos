        const [currentIndex, setCurrentIndex] = useState(0);
        const [itemsPerView, setItemsPerView] = useState(3);

        useEffect(() => {
          const handleResize = () => {
            if (window.innerWidth < 640) {
              setItemsPerView(1);
            } else if (window.innerWidth < 1024) {
              setItemsPerView(2);
            } else {
              setItemsPerView(3);
            }
          };
          window.addEventListener('resize', handleResize);
          handleResize(); // Initial check
          return () => window.removeEventListener('resize', handleResize);
        }, []);

        const totalItems = TEAM_DATA.length;
        const maxIndex = Math.ceil(totalItems / itemsPerView) - 1;

        const nextSlide = () => {
          setCurrentIndex((prevIndex) => (prevIndex === maxIndex ? 0 : prevIndex + 1));
        };

        const prevSlide = () => {
          setCurrentIndex((prevIndex) => (prevIndex === 0 ? maxIndex : prevIndex - 1));
        };
        
        const slideOffset = -currentIndex * 100;

        return (

                  aria-label="Anterior"
                >
                  <ChevronLeftIcon className="w-6 h-6" />
                </button>
                <button
                  onClick={nextSlide}
                  className="absolute top-1/2 -right-4 md:-right-6 transform -translate-y-1/2 bg-white text-primary rounded-full p-2 shadow-lg hover:bg-gray-100 transition-colors z-10"
                  aria-label="Próximo"
                >
                  <ChevronRightIcon className="w-6 h-6" />
                </button>
              </div>
            </div>
          </section>
        );
      };

      const EventsSection = () => {
          const getEventStatus = (eventDate) => {
              const now = new Date();
              const date = new Date(eventDate);
              now.setHours(0,0,0,0);
              date.setHours(0,0,0,0);

              if (date.getTime() < now.getTime()) return 'past';
              if (date.getTime() === now.getTime()) return 'today';
              return 'future';
          };

          const EventCard = ({ event }) => {
              const status = getEventStatus(event.date);
              const isHighlighted = status === 'today';

              const cardClasses = `
                  bg-white p-6 rounded-lg shadow-md flex flex-col
                  ${isHighlighted ? 'border-2 border-primary ring-4 ring-primary/20' : ''}
                  ${status === 'past' ? 'opacity-60' : ''}
                  transition-all duration-300
              `;

              return (
                  <div className={cardClasses}>
                      {isHighlighted && (
                          <span className="absolute -top-3 -right-3 bg-primary text-white text-xs font-bold px-3 py-1 rounded-full shadow-lg">HOJE</span>
                      )}
                       <div className="relative">
                          <h3 className="text-xl font-bold text-text-primary mb-2">{event.title}</h3>
                          <p className="font-semibold text-secondary mb-1">
                              {new Date(event.date).toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' })}
                          </p>
                          <p className="text-gray-500 mb-4">{event.time}</p>
                          <p className="text-text-secondary">{event.location}</p>
                       </div>
                  </div>
              );
          }

          const sortedEvents = [...EVENTS_DATA].sort((a, b) => new Date(a.date).getTime() - new Date(b.date).getTime());

          return (
          <section id="events" className="py-16 md:py-24">
            <div className="container mx-auto px-4 sm:px-6 lg:px-8">
              <div className="text-center mb-12">
                <h2 className="text-3xl md:text-4xl font-extrabold text-text-primary">Eventos</h2>
                <p className="mt-4 text-lg text-text-secondary">Fique por dentro dos próximos eventos:</p>
              </div>
              <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-8">
                {sortedEvents.map((event, index) => (
                   <div key={index} className="relative">
                       <EventCard event={event} />
                   </div>
                ))}
              </div>
            </div>
          </section>
        );
      };

      const LibrarySection = () => {
        const LibraryCard = ({ item }) => {
            const isPdf = item.type === LibraryItemType.PDF;

            return (
                <div className="bg-white rounded-lg shadow-lg overflow-hidden flex flex-col group">
                    {isPdf ? (
                        <div className="bg-secondary h-48 flex items-center justify-center">
                            <BookIcon className="w-24 h-24 text-white opacity-70" />
                        </div>
                    ) : (
                        <div className="relative h-48">
                            <img src={item.thumbnailUrl} alt={item.title} className="w-full h-full object-cover" />
                            <div className="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                                <PlayIcon className="w-20 h-20 text-white" />
                            </div>
                        </div>
                    )}
                    <div className="p-6 flex-grow flex flex-col">
                        <h3 className="text-lg font-bold text-text-primary mb-4 flex-grow">{item.title}</h3>
                        <a
                            href={item.link}
                            target="_blank"
                            rel="noopener noreferrer"
                            className="mt-auto w-full text-center bg-primary text-white font-semibold py-2 px-4 rounded-md hover:bg-secondary transition-colors duration-300"
                        >
                            {isPdf ? 'Baixar PDF' : 'Assistir no YouTube'}
                        </a>
                    </div>
                </div>
            );
        };

        return (
          <section id="gallery" className="bg-surface py-16 md:py-24">
            <div className="container mx-auto px-4 sm:px-6 lg:px-8">
              <div className="text-center mb-12">
                <h2 className="text-3xl md:text-4xl font-extrabold text-text-primary">Biblioteca Virtual</h2>
                <p className="mt-4 text-lg text-text-secondary max-w-3xl mx-auto">
                  Aqui você encontra uma coleção de recursos essenciais para a capacitação e atualização.
                </p>
              </div>
              <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-8">
                {LIBRARY_DATA.map((item, index) => (
                  <LibraryCard key={index} item={item} />
                ))}
              </div>
            </div>
          </section>
        );
      };

      const SocialsSection = () => {
        return (
          <section className="py-16 md:py-24">
            <div className="container mx-auto px-4 sm:px-6 lg:px-8">
              <div className="text-center mb-12">
                <h2 className="text-3xl md:text-4xl font-extrabold text-text-primary">Siga a Escola de Conselhos Tutelares do Piauí</h2>
                 <p className="mt-4 text-lg text-text-secondary">Fique por dentro de todas as novidades nas nossas redes sociais.</p>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                {SOCIAL_LINKS.map(({ name, href, icon: Icon }) => (
                  <a
                    key={name}
                    href={href}
                    target="_blank"
                    rel="noopener noreferrer"
                    className="group block bg-surface p-8 rounded-lg shadow-md hover:shadow-xl hover:bg-primary transition-all duration-300"
                  >
                    <Icon className="w-16 h-16 mx-auto mb-4 text-primary group-hover:text-white transition-colors duration-300" />
                    <h3 className="text-center text-2xl font-bold text-text-primary group-hover:text-white transition-colors duration-300">{name}</h3>
                    <p className="text-center text-text-secondary group-hover:text-gray-200 mt-2 transition-colors duration-300">
                      {name === 'YouTube' ? 'Acesse nosso canal' : 'Siga-nos'}
                    </p>
                  </a>
                ))}
              </div>
            </div>
          </section>
        );
      };

      const ContactSection = () => {
        return (
          <footer id="contact" className="bg-text-primary text-white py-16 md:py-24">
            <div className="container mx-auto px-4 sm:px-6 lg:px-8">
              <div className="text-center mb-12">
                <h2 className="text-3xl md:text-4xl font-extrabold">Quer Saber Mais? Estamos aqui para ajudar!</h2>
                <p className="mt-4 text-lg text-gray-300 max-w-3xl mx-auto">
                  Se você tem dúvidas, sugestões ou precisa de mais informações, não hesite em entrar em contato conosco.
                </p>
              </div>
              
              <div className="grid md:grid-cols-2 gap-12 items-center">
                  <div className="flex flex-col items-center md:items-start text-center md:text-left space-y-6">
                       <div className="flex-shrink-0">
                          <a href="#home" className="text-2xl font-bold text-white">
                          Logo Escola
                          </a>
                      </div>
                      <div>
                          <h4 className="font-bold text-lg mb-2">Endereço</h4>
                          <p className="text-gray-300">Rua Exemplo, 123 - Centro<br/>Teresina, PI - CEP 64000-000</p>
                      </div>
                       <div>
                          <h4 className="font-bold text-lg mb-2">Contato</h4>
                          <p className="text-gray-300">Telefone: (86) 99999-9999</p>
                           <p className="text-gray-300">
                              E-mail: <a href="mailto:contato@escoladeconselhos.pi.gov.br" className="text-accent hover:underline">contato@escoladeconselhos.pi.gov.br</a>
                          </p>
                      </div>
                  </div>

                  <div className="flex flex-col items-center justify-center space-y-6">
                      <p className="text-lg text-center">Fale conosco diretamente pelo WhatsApp!</p>
                      <a
                          href="https://wa.me/5586999999999"
                          target="_blank"
                          rel="noopener noreferrer"
                          className="inline-flex items-center gap-4 bg-green-500 text-white font-bold py-4 px-8 rounded-lg text-xl hover:bg-green-600 transition-colors duration-300 shadow-lg"
                      >
                          <WhatsAppIcon className="w-8 h-8"/>
                          <span>Entrar em contato</span>
                      </a>
                  </div>
              </div>

              <div className="border-t border-gray-700 mt-16 pt-8 text-center text-gray-400">
                <p>&copy; {new Date().getFullYear()} Escola de Conselhos Tutelares do Piauí. Todos os direitos reservados.</p>
              </div>
            </div>
          </footer>
        );
      };

      // =================================================================
      // === Main App Component
      // =================================================================

      const App = () => {
        return (
          <>
            <Header />
            <main>
              <HeroSection />
              <ProjectsSection />
              <NewsSection />
              <AboutUsSection />
              <EventsSection />
              <LibrarySection />
              <SocialsSection />
            </main>
            <ContactSection />
          </>
        );
      };

      // =================================================================
      // === Application Entry Point
      // =================================================================
      
      const rootElement = document.getElementById('root');
      if (!rootElement) {
        throw new Error("Could not find root element to mount to");
      }

      const root = ReactDOM.createRoot(rootElement);
      root.render(
        <React.StrictMode>
          <App />
        </React.StrictMode>
      );

    </script>
  </body>
</html>
