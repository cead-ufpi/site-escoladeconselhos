# Workflow simples para publicar conteúdo estático no GitHub Pages
name: Deploy do site da Escola de Conselhos

on:
  # Executa quando há push para a branch principal
  push:
    branches: ['master']

  # Permite executar esse workflow manualmente pela aba "Actions"
  workflow_dispatch:

# Define permissões do GITHUB_TOKEN para permitir publicação no GitHub Pages
permissions:
  contents: read       # Permissão de leitura dos arquivos do repositório
  pages: write         # Permissão para escrever no GitHub Pages
  id-token: write      # Permissão para gerar tokens de identidade

# Permite apenas uma publicação simultânea, ignorando execuções enfileiradas entre a execução atual e a mais recente.
# No entanto, NÃO cancela execuções em andamento, pois queremos que essas publicações de produção sejam concluídas.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  # Tarefa única de publicação, já que estamos apenas publicando
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Faz upload da pasta dist
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
